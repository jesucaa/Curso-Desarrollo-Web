<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Café</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">

        <div class="container">
            <div class="bar">
                <a href="index.html" class="logo">
                    <h1 class="logo__name no-margin center-text">Blog<span 
                        class="bold">DeCafé</span></h1>
                </a>

                <nav class="navigation">
                    <!-- truco para colocar 3 elementos con mismo nombre de clase: a.navigation__link*3 -->
                    <a href="nosotros.html" class="navigation__link">Nosotros</a>
                    <a href="cursos.html" class="navigation__link">Cursos</a>
                    <a href="contacto.html" class="navigation__link">Contacto</a>
                </nav>
            </div>
        </div>

        <div class="header__text">
            <h2 class="no-margin center-text">Blog de café con consejos y cursos</h2>
            <p class="no-margin center-text">Aprende de los expertos con las mejores recetas y consejos</p>
        </div>
    </header>

    <main class="container">
        <h3 class="center-text">Contacto</h3>

        <div class="contact-bg"></div>

        <form class="form">
            <div class="field">
                <label class="field__label" for="name">Nombre</label>
                <input class="field__input" type="text" name="name" id="name" placeholder="Tu Nombre">
            </div>
            <div class="field">
                <label class="field__label" for="email">E-mail</label>
                <input class="field__input" type="email" name="email" id="email" placeholder="Tu E-mail">
            </div>
            <div class="field">
                <label class="field__label" for="message">Mensaje</label>
                <textarea class="field__input field__input--textarea" name="message" id="message" placeholder="Tu Mensaje"></textarea>
            </div>

            <div class="field">
                <button type="submit" class="button button--primary">Enviar</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="bar">
                <a href="index.html" class="logo">
                    <h1 class="logo__name no-margin center-text">Blog<span 
                        class="bold">DeCafé</span></h1>
                </a>

                <nav class="navigation">
                    <!-- truco para colocar 3 elementos con mismo nombre de clase: a.navigation__link*3 -->
                    <a href="nosotros.html" class="navigation__link">Nosotros</a>
                    <a href="cursos.html" class="navigation__link">Cursos</a>
                    <a href="contacto.html" class="navigation__link">Contacto</a>
                </nav>
            </div>
        </div>

    </footer>
</body>
</html>
